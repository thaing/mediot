apiVersion: apps/v1
kind: Deployment
metadata:
  name: mediot-api
  namespace: mediot
  labels:
    app: mediot-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mediot-api
  template:
    metadata:
      labels:
        app: mediot-api
    spec:
      containers:
        - name: api
          image: mediot-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: mediot-config
            - secretRef:
                name: mediot-secrets
          livenessProbe:
            httpGet:
              path: /docs
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /docs
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: api-service
  namespace: mediot
spec:
  selector:
    app: mediot-api
  ports:
    - port: 8000
      targetPort: 8000
  type: ClusterIP
