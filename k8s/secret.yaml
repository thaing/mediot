# DO NOT commit real values — this is a template.
# Populate from AWS Secrets Manager:
#   aws secretsmanager get-secret-value --secret-id mediot/database_url --query SecretString --output text
# Or from GCP Secret Manager:
#   gcloud secrets versions access latest --secret=mediot-database-url
# For Minikube: fill placeholder values directly.
apiVersion: v1
kind: Secret
metadata:
  name: mediot-secrets
  namespace: mediot
type: Opaque
stringData:
  DATABASE_URL: "postgresql://user:changeme@postgres-host:5432/mediot"
  API_KEY: "changeme-device-api-key"
  JWT_SECRET: "changeme-jwt-secret-at-least-32-characters"
  OAUTH_GOOGLE_CLIENT_ID: "your-google-client-id"
  OAUTH_GOOGLE_CLIENT_SECRET: "your-google-client-secret"
  OAUTH_APPLE_CLIENT_ID: "your-apple-client-id"
  OAUTH_APPLE_CLIENT_SECRET: "your-apple-client-secret"
  OAUTH_FACEBOOK_CLIENT_ID: "your-facebook-client-id"
  OAUTH_FACEBOOK_CLIENT_SECRET: "your-facebook-client-secret"
